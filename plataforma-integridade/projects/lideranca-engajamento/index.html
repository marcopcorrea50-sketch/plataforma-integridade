<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Título do Módulo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #0f172a;
      margin: 0;
      padding: 32px;
    }

    .card {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border: 1px solid #dbe3ee;
      border-radius: 16px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      color: #0f4c81;
    }

    .bloco {
      margin-top: 18px;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid #dbe3ee;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Título do Módulo</h1>
    <p>Descrição do módulo.</p>

    <div class="bloco">
      <h3>Objetivo</h3>
      <p>Inserir objetivo do módulo.</p>
    </div>

    <div class="bloco">
      <h3>Aplicação</h3>
      <p>Inserir conteúdo da área.</p>
    </div>

    <div class="bloco">
      <h3>Status</h3>
      <p>Módulo em estruturação.</p>
    </div>
  </div>
</body>
</html>
