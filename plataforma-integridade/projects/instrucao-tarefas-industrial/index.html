<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#00805A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FacilITa"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
<title>FacilITa — Escolha o Tema</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  min-height:100%;font-family:'Outfit',system-ui,sans-serif;
  background:linear-gradient(160deg,#f0faf5 0%,#e0f5ec 50%,#d0efe4 100%);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 16px 32px;
}
.bg-dot{position:fixed;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh);opacity:0}10%{opacity:.35}90%{opacity:.35}100%{transform:translateY(-40px);opacity:0}}

.container{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}

/* Logo */
.logo-area{display:flex;flex-direction:column;align-items:center;margin-bottom:26px;}
.logo-row{display:flex;align-items:center;gap:2px;}
.logo-text{display:flex;align-items:flex-end;line-height:1;}
.logo-text .g{font-size:46px;font-weight:900;color:#00805A;letter-spacing:-2px;}
.logo-text .y{font-size:46px;font-weight:900;color:#FFB800;letter-spacing:-2px;}
.logo-tick{width:26px;height:26px;margin-bottom:5px;margin-left:-1px;}
.logo-slogan{font-size:12px;font-weight:600;color:#3a8a68;margin-top:6px;text-align:center;}

.section-title{font-size:11px;font-weight:800;color:#5aaa88;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}

/* Grade 2x2 */
.themes{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}

.tc{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:16px 10px 14px;border-radius:18px;
  cursor:pointer;text-decoration:none;
  transition:transform .18s,box-shadow .18s;
  border:2px solid transparent;position:relative;overflow:hidden;
}
.tc:active{transform:scale(.94);}

.tc.escuro{ background:linear-gradient(145deg,#0A1F16,#163020);border-color:rgba(255,82,82,.25);box-shadow:0 6px 24px rgba(0,0,0,.3);}
.tc.verde{  background:linear-gradient(145deg,#071510,#0F2A1E);border-color:rgba(0,220,140,.2);box-shadow:0 6px 24px rgba(0,0,0,.25);}
.tc.dourado{background:linear-gradient(145deg,#1A1400,#2A2000);border-color:rgba(255,184,0,.25);box-shadow:0 6px 24px rgba(0,0,0,.25);}
.tc.claro{  background:linear-gradient(145deg,#FFFFFF,#EEF9F4);border-color:rgba(0,128,90,.2);box-shadow:0 6px 24px rgba(0,128,90,.1);}

/* Preview mini */
.preview{width:72px;height:100px;border-radius:10px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.25);}
.pbar{height:13px;display:flex;align-items:center;padding:0 5px;gap:3px;}
.pdot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5);}
.pbody{padding:5px 4px;display:flex;flex-direction:column;gap:3px;}
.pline{height:4px;border-radius:2px;}
.pcard{border-radius:5px;padding:4px;display:flex;flex-direction:column;gap:2px;margin-top:2px;}

.escuro .pbar{background:#7F1D1D;} .escuro .pbody{background:#1A0B0B;} .escuro .pline{background:rgba(255,82,82,.25);} .escuro .pcard{background:rgba(255,255,255,.05);}
.verde  .pbar{background:#0F2A1E;} .verde  .pbody{background:#071510;} .verde  .pline{background:rgba(0,220,140,.22);} .verde  .pcard{background:rgba(255,255,255,.04);}
.dourado .pbar{background:#2A2000;} .dourado .pbody{background:#1A1400;} .dourado .pline{background:rgba(255,184,0,.22);} .dourado .pcard{background:rgba(255,255,255,.04);}
.claro  .pbar{background:#00805A;} .claro  .pbody{background:#F5FAF7;} .claro  .pline{background:rgba(0,128,90,.18);} .claro  .pcard{background:rgba(255,255,255,.85);}

.tc-label{font-size:13px;font-weight:800;}
.escuro .tc-label{color:#FF8080;} .verde .tc-label{color:#60F0A0;} .dourado .tc-label{color:#FFB800;} .claro .tc-label{color:#00805A;}

.tc-desc{font-size:9px;font-weight:600;text-align:center;line-height:1.4;opacity:.7;}
.escuro .tc-desc,.verde .tc-desc,.dourado .tc-desc{color:#aaddcc;} .claro .tc-desc{color:#3a8060;}

.badge-last{
  position:absolute;top:8px;right:8px;
  font-size:7px;font-weight:800;letter-spacing:.8px;
  padding:2px 6px;border-radius:10px;text-transform:uppercase;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
}
.claro .badge-last{background:rgba(0,128,90,.12);color:#00805A;}

.footer{margin-top:20px;font-size:9.5px;color:#6aaa8a;font-weight:600;letter-spacing:.5px;text-align:center;}
</style>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <div class="logo-row">
      <svg width="52" height="50" viewBox="0 0 70 68" style="margin-right:3px;">
        <path d="M8,46 Q8,18 35,18 Q62,18 62,46 Z" fill="#FFB800"/>
        <path d="M14,46 Q14,24 35,24 Q56,24 56,46 Z" fill="#FFC800"/>
        <rect x="5" y="46" width="60" height="9" rx="4" fill="#FFB800"/>
        <path d="M20,38 L28,46 L48,26" stroke="#00805A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M20,38 L28,46 L48,26" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".5"/>
      </svg>
      <div class="logo-text">
        <span class="g">Facil</span><span class="y">IT</span><span class="g">a</span>
        <svg class="logo-tick" viewBox="0 0 32 32">
          <path d="M4,16 L12,24 L28,8" stroke="#00805A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <div class="logo-slogan">Segurança, padronização e eficiência na palma da mão.</div>
  </div>

  <div class="section-title">Escolha o tema</div>

  <div class="themes">

    <a class="tc escuro" href="tema-escuro.html" id="card-escuro">
      <div class="preview">
        <div class="pbar"><div class="pdot"></div><div class="pdot"></div></div>
        <div class="pbody">
          <div class="pline" style="width:70%"></div><div class="pline" style="width:50%"></div>
          <div class="pcard"><div class="pline" style="width:85%"></div><div class="pline" style="width:65%"></div></div>
          <div class="pcard"><div class="pline" style="width:55%"></div></div>
        </div>
      </div>
      <div class="tc-label">🌙 Escuro</div>
      <div class="tc-desc">Vermelho<br/>para campo</div>
    </a>

    <a class="tc verde" href="tema-verde.html" id="card-verde">
      <div class="preview">
        <div class="pbar"><div class="pdot"></div><div class="pdot"></div></div>
        <div class="pbody">
          <div class="pline" style="width:70%"></div><div class="pline" style="width:50%"></div>
          <div class="pcard"><div class="pline" style="width:85%"></div><div class="pline" style="width:65%"></div></div>
          <div class="pcard"><div class="pline" style="width:55%"></div></div>
        </div>
      </div>
      <div class="tc-label">🌿 Verde</div>
      <div class="tc-desc">FacilITa<br/>original</div>
    </a>

    <a class="tc dourado" href="tema-dourado.html" id="card-dourado">
      <div class="preview">
        <div class="pbar"><div class="pdot"></div><div class="pdot"></div></div>
        <div class="pbody">
          <div class="pline" style="width:70%"></div><div class="pline" style="width:50%"></div>
          <div class="pcard"><div class="pline" style="width:85%"></div><div class="pline" style="width:65%"></div></div>
          <div class="pcard"><div class="pline" style="width:55%"></div></div>
        </div>
      </div>
      <div class="tc-label">✨ Dourado</div>
      <div class="tc-desc">Elegante<br/>premium</div>
    </a>

    <a class="tc claro" href="tema-claro.html" id="card-claro">
      <div class="preview">
        <div class="pbar"><div class="pdot"></div><div class="pdot"></div></div>
        <div class="pbody">
          <div class="pline" style="width:70%"></div><div class="pline" style="width:50%"></div>
          <div class="pcard"><div class="pline" style="width:85%"></div><div class="pline" style="width:65%"></div></div>
          <div class="pcard"><div class="pline" style="width:55%"></div></div>
        </div>
      </div>
      <div class="tc-label">☀️ Claro</div>
      <div class="tc-desc">Fundo branco<br/>escritório</div>
    </a>

  </div>

  <div class="footer">FacilITa · VALE S.A. · Serra Sul S11D · GIE</div>
</div>

<script>
// Pontos flutuantes
const cols=['#00B48A','#FFB800','#00805A','#4ECDA4'];
for(let i=0;i<14;i++){
  const d=document.createElement('div');d.className='bg-dot';
  const sz=3+Math.random()*7;
  d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${cols[i%4]};animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*7}s;`;
  document.body.appendChild(d);
}
// Último tema usado
const ul=localStorage.getItem('facilita_ultimo_tema');
if(ul){
  const c=document.getElementById('card-'+ul);
  if(c){const b=document.createElement('span');b.className='badge-last';b.textContent='Último';c.appendChild(b);}
}
// Salvar escolha
document.querySelectorAll('.tc').forEach(c=>{
  c.addEventListener('click',()=>{localStorage.setItem('facilita_ultimo_tema',c.id.replace('card-',''));});
});
// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
</html>
